<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">

    <div class="grid-background"></div>

        <div class="card-container">

            </div>

            <div class="cyber-card">
                <div class="card-border"></div>
                <div class="card-content">
                    <span class="icon">🕸️</span>

                    <p>Web Red Team Analyst</p>
                    <a href="https://labs.cyberwarfare.live/credential/achievement/698df88d5f7c23c92b92fed6" class="verify-btn">Verify</a>

            </div>

            <div class="cyber-card">
                <div class="card-border"></div>
                <div class="card-content">
                    <span class="icon">🔐</span>
                    <h3>ISC2</h3>
                    <p>Certified in Cybersecurity</p>
                    <a href="https://isc2.obrizum.io/org/cc/certificate/6897ff84-ff07-407b-aa26-f2321abe51bb" class="verify-btn">Verify</a>

        <footer class="cyber-footer">
